name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE }}
      VITE_AAD_CLIENT_ID: ${{ secrets.VITE_AAD_CLIENT_ID }}
      VITE_AAD_TENANT_ID: ${{ secrets.VITE_AAD_TENANT_ID }}
      VITE_AAD_AUTHORITY: ${{ secrets.VITE_AAD_AUTHORITY }}
      VITE_AAD_REDIRECT_URI: ${{ secrets.VITE_AAD_REDIRECT_URI }}
      VITE_SHAREPOINT_SITE_ID: ${{ secrets.VITE_SHAREPOINT_SITE_ID }}
      VITE_SHAREPOINT_DRIVE_ID: ${{ secrets.VITE_SHAREPOINT_DRIVE_ID }}
      VITE_SHAREPOINT_FOLDER_PATH: ${{ secrets.VITE_SHAREPOINT_FOLDER_PATH }}
      VITE_DEPT_CONFIG_FILE: ${{ secrets.VITE_DEPT_CONFIG_FILE }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          api_location: ""
          output_location: "dist"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
